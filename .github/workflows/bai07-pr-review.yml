name: Bai07 - PR Auto Review

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  style-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Bai07/src
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Checkstyle
        run: mvn -B checkstyle:checkstyle

      - name: Inline checkstyle review
        uses: dbelyaev/action-checkstyle@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          checkstyle_config: google_checks.xml
          fail_on_error: true

      - name: Run unit tests
        run: mvn -B test
